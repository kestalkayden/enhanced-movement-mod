# Build both loader subprojects on every push / PR, and auto-publish to
# Modrinth + CurseForge whenever a v* tag is pushed.

name: build
on:
  push:
    branches: ['**']
    tags: ['v*']
  pull_request:

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup jdk 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build all loaders
        run: ./gradlew buildAll --stacktrace

      - name: upload fabric jar
        uses: actions/upload-artifact@v4
        with:
          name: fabric-jars
          path: fabric/build/libs/*.jar
          if-no-files-found: error

      - name: upload neoforge jar
        uses: actions/upload-artifact@v4
        with:
          name: neoforge-jars
          path: neoforge/build/libs/*.jar
          if-no-files-found: error

  publish:
    name: publish to Modrinth and CurseForge
    needs: build
    if: startsWith(github.ref, 'refs/tags/v')
    runs-on: ubuntu-24.04
    permissions:
      contents: write
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: download fabric jars
        uses: actions/download-artifact@v4
        with:
          name: fabric-jars
          path: fabric/build/libs

      - name: download neoforge jars
        uses: actions/download-artifact@v4
        with:
          name: neoforge-jars
          path: neoforge/build/libs

      - name: publish fabric
        id: publish-fabric
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: enhanced-movement
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: 843764
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: ${{ github.ref_name }}
          changelog-file: .github/changelogs/${{ github.ref_name }}.md
          files: |
            fabric/build/libs/!(*-@(sources|javadoc)).jar
          loaders: fabric
          game-versions: |
            26.1
            26.1.1
            26.1.2
          version-type: release
          java: 25

      - name: patch modrinth fabric env metadata
        if: success() && steps.publish-fabric.outputs.modrinth-version != ''
        run: |
          curl -fsS -X PATCH "https://api.modrinth.com/v2/version/${{ steps.publish-fabric.outputs.modrinth-version }}" \
            -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"client_side":"required","server_side":"required"}'

      - name: publish neoforge
        id: publish-neoforge
        uses: Kir-Antipov/mc-publish@v3.3
        with:
          modrinth-id: enhanced-movement
          modrinth-token: ${{ secrets.MODRINTH_TOKEN }}
          curseforge-id: 843764
          curseforge-token: ${{ secrets.CURSEFORGE_TOKEN }}
          github-token: ${{ secrets.GITHUB_TOKEN }}
          github-tag: ${{ github.ref_name }}
          changelog-file: .github/changelogs/${{ github.ref_name }}.md
          files: |
            neoforge/build/libs/!(*-@(sources|javadoc)).jar
          loaders: neoforge
          game-versions: |
            26.1
            26.1.1
            26.1.2
          version-type: release
          java: 25

      - name: patch modrinth neoforge env metadata
        if: success() && steps.publish-neoforge.outputs.modrinth-version != ''
        run: |
          curl -fsS -X PATCH "https://api.modrinth.com/v2/version/${{ steps.publish-neoforge.outputs.modrinth-version }}" \
            -H "Authorization: ${{ secrets.MODRINTH_TOKEN }}" \
            -H "Content-Type: application/json" \
            -d '{"client_side":"required","server_side":"required"}'
