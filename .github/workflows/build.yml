# Build both loader subprojects on every push and pull request.
# Uses Java 25 to match the project toolchain (Minecraft 26.1+).

name: build
on: [pull_request, push]

jobs:
  build:
    runs-on: ubuntu-24.04
    steps:
      - name: checkout repository
        uses: actions/checkout@v4

      - name: setup jdk 25
        uses: actions/setup-java@v4
        with:
          java-version: '25'
          distribution: 'temurin'

      - name: validate gradle wrapper
        uses: gradle/actions/wrapper-validation@v4

      - name: make gradle wrapper executable
        run: chmod +x ./gradlew

      - name: build all loaders
        run: ./gradlew buildAll --stacktrace

      - name: upload fabric jar
        uses: actions/upload-artifact@v4
        with:
          name: fabric
          path: fabric/build/libs/*.jar
          if-no-files-found: error

      - name: upload neoforge jar
        uses: actions/upload-artifact@v4
        with:
          name: neoforge
          path: neoforge/build/libs/*.jar
          if-no-files-found: error
